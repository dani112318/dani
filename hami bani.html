<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Bani & Hami - Love Story ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%);
            color: #0369a1;
            scroll-behavior: smooth;
            overflow-x: hidden;
            width: 100%;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --light-blue-1: #e0f2fe;
            --light-blue-2: #bae6fd;
            --light-blue-3: #7dd3fc;
            --light-blue-4: #38bdf8;
            --light-blue-5: #0284c7;
            --text-color: #0369a1;
        }

        /* Navigation Bar - Mobile First - Top Navigation */
        .nav-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            width: auto;
        }

        @media (min-width: 769px) {
            .nav-container {
                position: fixed;
                left: 30px;
                top: 50%;
                transform: translateY(-50%);
                width: auto;
            }
        }

        .nav-menu {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 50px;
            padding: 10px 15px;
            box-shadow: 0 10px 30px rgba(2, 132, 199, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        @media (min-width: 769px) {
            .nav-menu {
                padding: 20px 10px;
                border-radius: 50px;
            }
        }

        .nav-menu ul {
            list-style: none;
            display: flex;
            flex-direction: row;
            gap: 20px;
            justify-content: center;
        }

        @media (min-width: 769px) {
            .nav-menu ul {
                flex-direction: column;
                gap: 25px;
            }
        }

        .nav-menu a {
            text-decoration: none;
            color: var(--text-color);
            font-weight: 600;
            font-size: 0.9rem;
            padding: 8px 15px;
            border-radius: 30px;
            transition: all 0.3s ease;
            display: block;
            text-align: center;
            background: rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.5);
            -webkit-touch-callout: none;
        }

        @media (min-width: 769px) {
            .nav-menu a {
                font-size: 1.1rem;
                padding: 10px 20px;
            }
        }

        .nav-menu a:hover {
            background: var(--light-blue-4);
            color: white;
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(56, 189, 248, 0.4);
        }

        .nav-menu a:active {
            transform: scale(0.95);
            background: var(--light-blue-5);
        }

        /* Main content - Centered on mobile */
        .content {
            margin-left: 0;
            padding: 80px 15px 20px;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        @media (min-width: 769px) {
            .content {
                margin-left: 120px;
                padding: 20px;
                width: calc(100% - 120px);
            }
        }

        section {
            min-height: 100vh;
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        @media (min-width: 769px) {
            section {
                padding: 60px 40px;
            }
        }

        /* Page 1 - Main Page */
        #page1 {
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Floating hearts background */
        .floating-hearts {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 0;
        }

        .heart {
            position: absolute;
            font-size: 1.5rem;
            opacity: 0.15;
            animation: floatHeart 8s infinite ease-in-out;
            color: var(--light-blue-5);
        }

        @media (min-width: 769px) {
            .heart {
                font-size: 2rem;
                opacity: 0.2;
            }
        }

        .heart:nth-child(1) { top: 5%; left: 5%; animation-delay: 0s; }
        .heart:nth-child(2) { top: 15%; right: 10%; animation-delay: 1s; }
        .heart:nth-child(3) { bottom: 10%; left: 10%; animation-delay: 2s; }
        .heart:nth-child(4) { bottom: 20%; right: 15%; animation-delay: 3s; }
        .heart:nth-child(5) { top: 30%; left: 30%; animation-delay: 4s; }
        .heart:nth-child(6) { top: 60%; right: 20%; animation-delay: 5s; }
        .heart:nth-child(7) { bottom: 5%; left: 50%; animation-delay: 6s; }
        .heart:nth-child(8) { top: 10%; right: 40%; animation-delay: 7s; }

        @keyframes floatHeart {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 40px 20px;
            box-shadow: 0 20px 40px rgba(2, 132, 199, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.5);
            gap: 40px;
        }

        @media (min-width: 769px) {
            .main-container {
                flex-direction: row;
                padding: 60px 80px;
                gap: 0;
            }
        }

        .left-text {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--text-color);
            text-shadow: 2px 2px 0 rgba(255,255,255,0.7), 3px 3px 0 rgba(2, 132, 199, 0.2);
            line-height: 1.3;
            position: relative;
            text-align: center;
            margin-bottom: 20px;
        }

        @media (min-width: 480px) {
            .left-text {
                font-size: 3rem;
            }
        }

        @media (min-width: 769px) {
            .left-text {
                font-size: 5rem;
                text-align: left;
                margin-bottom: 0;
            }
        }

        .left-text span {
            display: inline-block;
            animation: popIn 0.5s ease forwards;
            opacity: 0;
            transform: scale(0.8);
            margin: 0 2px;
        }

        .left-text span:nth-child(1) { animation-delay: 0.1s; }
        .left-text span:nth-child(2) { animation-delay: 0.2s; }
        .left-text span:nth-child(3) { animation-delay: 0.3s; }
        .left-text span:nth-child(4) { animation-delay: 0.4s; }
        .left-text span:nth-child(5) { animation-delay: 0.5s; }
        .left-text span:nth-child(6) { animation-delay: 0.6s; }
        .left-text span:nth-child(7) { animation-delay: 0.7s; }
        .left-text span:nth-child(8) { animation-delay: 0.8s; }
        .left-text span:nth-child(9) { animation-delay: 0.9s; }
        .left-text span:nth-child(10) { animation-delay: 1.0s; }
        .left-text span:nth-child(11) { animation-delay: 1.1s; }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.8) rotate(-5deg); }
            100% { opacity: 1; transform: scale(1) rotate(0); }
        }

        .left-text::before {
            content: '❤️';
            position: absolute;
            top: -30px;
            left: -15px;
            font-size: 2rem;
            animation: spin 4s linear infinite;
        }

        .left-text::after {
            content: '❤️';
            position: absolute;
            bottom: -30px;
            right: -15px;
            font-size: 2rem;
            animation: spin 4s linear infinite reverse;
        }

        @media (min-width: 769px) {
            .left-text::before {
                top: -30px;
                left: -30px;
                font-size: 3rem;
            }
            .left-text::after {
                bottom: -30px;
                right: -30px;
                font-size: 3rem;
            }
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .right-stickers {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            position: relative;
            flex-wrap: wrap;
        }

        @media (min-width: 769px) {
            .right-stickers {
                gap: 60px;
            }
        }

        .sticker-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .sticker {
            font-size: 7rem;
            filter: drop-shadow(0 20px 30px rgba(2, 132, 199, 0.4));
            transition: all 0.3s ease;
            animation: bounce 2s ease-in-out infinite;
            position: relative;
            cursor: pointer;
        }

        @media (min-width: 480px) {
            .sticker {
                font-size: 8rem;
            }
        }

        @media (min-width: 769px) {
            .sticker {
                font-size: 10rem;
            }
        }

        .sticker.hamster {
            animation-delay: 0s;
            order: 1;
        }

        .sticker.bunny {
            animation-delay: 0.5s;
            order: 2;
        }

        .sticker:hover {
            transform: scale(1.2) rotate(5deg);
            filter: drop-shadow(0 40px 50px rgba(2, 132, 199, 0.6));
        }

        .sticker:active {
            transform: scale(1.1) rotate(3deg);
        }

        .sticker-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0) 70%);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .sticker-container:hover .sticker-glow {
            opacity: 1;
        }

        /* Sticker name tooltip on hover */
        .sticker-name {
            position: absolute;
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(2, 132, 199, 0.9);
            backdrop-filter: blur(5px);
            color: white;
            padding: 5px 15px;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 600;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            z-index: 10;
            border: 1px solid rgba(255,255,255,0.5);
        }

        .sticker-container:hover .sticker-name {
            opacity: 1;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @media (min-width: 769px) {
            @keyframes bounce {
                0%, 100% { transform: translateY(0); }
                50% { transform: translateY(-30px); }
            }
        }

        /* Page 2 - Pictures Gallery - New Background */
        #page2 {
            justify-content: center;
            background: linear-gradient(135deg, #c3e0f5 0%, #9fd3f0 100%);
            border-radius: 30px;
            margin: 20px 0;
        }

        .gallery-title {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 30px;
            color: var(--text-color);
            text-shadow: 2px 2px 0 rgba(255,255,255,0.5);
            position: relative;
            word-break: break-word;
        }

        @media (min-width: 480px) {
            .gallery-title {
                font-size: 2.5rem;
            }
        }

        @media (min-width: 769px) {
            .gallery-title {
                font-size: 3rem;
                margin-bottom: 40px;
            }
        }

        .gallery-title::before,
        .gallery-title::after {
            content: '❤️';
            font-size: 1.5rem;
            margin: 0 5px;
            animation: pulse 1.5s infinite;
        }

        @media (min-width: 769px) {
            .gallery-title::before,
            .gallery-title::after {
                font-size: 2rem;
                margin: 0 20px;
            }
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            padding: 10px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        @media (min-width: 480px) {
            .gallery-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 12px;
            }
        }

        @media (min-width: 768px) {
            .gallery-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 15px;
                padding: 15px;
            }
        }

        @media (min-width: 992px) {
            .gallery-grid {
                grid-template-columns: repeat(5, 1fr);
                gap: 20px;
                padding: 20px;
            }
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(2, 132, 199, 0.2);
            cursor: pointer;
            transition: all 0.3s ease;
            aspect-ratio: 3/4;
        }

        @media (min-width: 769px) {
            .gallery-item {
                border-radius: 15px;
            }
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: filter 0.5s ease;
        }

        .gallery-item:hover img {
            filter: blur(8px);
        }

        .gallery-item:active img {
            filter: blur(5px);
        }

        .gallery-caption {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            font-size: 0.9rem;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.5s ease;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            width: 90%;
            z-index: 2;
            background: rgba(2, 132, 199, 0.8);
            padding: 10px;
            border-radius: 8px;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            word-break: break-word;
        }

        @media (min-width: 769px) {
            .gallery-caption {
                font-size: 1.2rem;
                padding: 15px;
                border-radius: 10px;
            }
        }

        .gallery-item:hover .gallery-caption,
        .gallery-item:active .gallery-caption {
            opacity: 1;
        }

        /* Page 3 - 2 Songs Section */
        #page3 {
            justify-content: center;
            align-items: center;
        }

        .songs-title {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 30px;
            color: var(--text-color);
            text-shadow: 2px 2px 0 rgba(255,255,255,0.5);
            word-break: break-word;
        }

        @media (min-width: 480px) {
            .songs-title {
                font-size: 2.5rem;
            }
        }

        @media (min-width: 769px) {
            .songs-title {
                font-size: 3rem;
                margin-bottom: 40px;
            }
        }

        .album-grid {
            display: grid;
            grid-template-columns: repeat(1, 1fr);
            gap: 25px;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
        }

        @media (min-width: 600px) {
            .album-grid {
                grid-template-columns: repeat(2, 1fr);
                max-width: 800px;
            }
        }

        .song-card {
            position: relative;
            aspect-ratio: 1;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(2, 132, 199, 0.3);
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .song-card:hover {
            transform: translateY(-10px);
        }

        .song-card:active {
            transform: translateY(-5px);
        }

        .album-cover {
            width: 100%;
            height: 100%;
            position: relative;
            background: linear-gradient(135deg, var(--light-blue-3), var(--light-blue-5));
        }

        .album-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: filter 0.5s ease;
        }

        .song-card:hover .album-cover img,
        .song-card:active .album-cover img {
            filter: blur(8px);
        }

        .play-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            color: var(--light-blue-5);
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s ease;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            z-index: 20;
            cursor: pointer;
            border: 2px solid white;
        }

        .song-card:hover .play-button,
        .song-card:active .play-button {
            opacity: 1;
            animation: pulse 1.5s infinite;
        }

        .play-button:hover {
            transform: translate(-50%, -50%) scale(1.1);
            background: white;
        }

        .play-button:active {
            transform: translate(-50%, -50%) scale(0.95);
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255,255,255,0.7); }
            70% { box-shadow: 0 0 0 15px rgba(255,255,255,0); }
            100% { box-shadow: 0 0 0 0 rgba(255,255,255,0); }
        }

        .song-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 15px;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            transform: translateY(100%);
            transition: transform 0.3s ease;
            border-top: 1px solid rgba(255,255,255,0.5);
            z-index: 15;
        }

        .song-card:hover .song-info,
        .song-card:active .song-info {
            transform: translateY(0);
        }

        .song-title {
            font-weight: 600;
            color: var(--text-color);
            font-size: 1rem;
            text-align: center;
        }

        .song-artist {
            font-size: 0.85rem;
            color: var(--light-blue-5);
            text-align: center;
            margin-top: 5px;
        }

        /* Music Player Bar */
        .music-player-bar {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 50px;
            padding: 15px 25px;
            width: 100%;
            max-width: 800px;
            margin: 40px auto 0;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 30px rgba(2, 132, 199, 0.2);
        }

        .player-main-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        @media (min-width: 600px) {
            .player-main-controls {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: space-between;
            }
        }

        .now-playing-info {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            width: 100%;
        }

        @media (min-width: 600px) {
            .now-playing-info {
                width: auto;
                min-width: 150px;
                align-items: flex-start;
                text-align: left;
            }
        }

        .now-playing-title {
            font-weight: 600;
            color: var(--text-color);
            font-size: 0.9rem;
        }

        .now-playing-artist {
            font-size: 0.75rem;
            color: var(--light-blue-5);
        }

        .control-buttons {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            width: 100%;
        }

        @media (min-width: 600px) {
            .control-buttons {
                width: auto;
            }
        }

        .player-btn {
            background: none;
            border: none;
            font-size: 1.6rem;
            cursor: pointer;
            color: var(--text-color);
            transition: all 0.3s ease;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            -webkit-tap-highlight-color: transparent;
        }

        @media (min-width: 769px) {
            .player-btn {
                font-size: 1.8rem;
                width: 45px;
                height: 45px;
            }
        }

        .player-btn:hover {
            transform: scale(1.2);
            color: var(--light-blue-5);
            background: rgba(255,255,255,0.3);
        }

        .player-btn:active {
            transform: scale(0.95);
        }

        .player-btn.special {
            font-size: 2rem;
            color: var(--light-blue-5);
        }

        @media (min-width: 769px) {
            .player-btn.special {
                font-size: 2.2rem;
            }
        }

        .progress-container {
            width: 100%;
            min-width: 150px;
        }

        @media (min-width: 600px) {
            .progress-container {
                flex: 1;
            }
        }

        .progress-bar {
            width: 100%;
            height: 5px;
            background: rgba(255,255,255,0.3);
            border-radius: 10px;
            cursor: pointer;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: var(--light-blue-5);
            border-radius: 10px;
            width: 0%;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            margin-top: 5px;
            color: var(--text-color);
        }

        .volume-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            justify-content: center;
        }

        @media (min-width: 600px) {
            .volume-controls {
                width: auto;
            }
        }

        .volume-slider {
            width: 80px;
            height: 5px;
            background: rgba(255,255,255,0.3);
            border-radius: 10px;
            cursor: pointer;
            position: relative;
        }

        .volume-fill {
            height: 100%;
            background: var(--light-blue-5);
            border-radius: 10px;
            width: 70%;
        }

        .volume-icon {
            font-size: 1.1rem;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .song-card.playing {
            border: 3px solid white;
            box-shadow: 0 0 30px white;
        }

        /* Touch-friendly adjustments */
        button, .song-card, .gallery-item, .sticker-container {
            touch-action: manipulation;
        }
    </style>
</head>
<body>
    <div class="nav-container">
        <div class="nav-menu">
            <ul>
                <li><a href="#page1">🏠 Home</a></li>

    <script>
        // ============================================
        // 📸 EASY PHOTO CONFIGURATION SECTION 📸
        // ============================================
        // EDIT YOUR 25 PHOTOS HERE:
        // Just add your image paths and custom captions below!
        // ============================================
        
        const photos = [
            { image: "pic1.jpg", caption: "The blue flower" },
            { image: "pic2.jpg", caption: "With A kiss" },
            { image: "pic3.jpg", caption: "Date in The GARLIC KITCHEN" },
            { image: "pic4.jpg", caption: "SHE's just so PRETTY" },
            { image: "pic5.jpg", caption: "MATCHA ICE CREAM BDAY GIFT" },
            { image: "pic6.jpg", caption: "A NEW YEAR WITH HER" },
            { image: "pic7.jpg", caption: "2nd ANNIV ft. NIGHT WALK" },
            { image: "pic8.jpg", caption: "Random PICS at MOA" },
            { image: "pic9.jpg", caption: "DATE At MOA!" },
            { image: "pic10.jpg", caption: "PICNIC in a GREEN" },
            { image: "pic11.jpg", caption: "0.5 for that time" },
            { image: "pic12.jpg", caption: "Things like to do for her" },
            { image: "pic13.jpg", caption: "LRT pic" },
            { image: "pic14.jpg", caption: "After the FILM" },
            { image: "pic15.jpg", caption: "Damn Ramen" },
            { image: "pic16.jpg", caption: "WE LOVE IT" },
            { image: "pic17.jpg", caption: "WE HAD BULDAK TIME" },
            { image: "pic18.jpg", caption: "With the PRETTY SHORTHAIRED" },
            { image: "pic19.jpg", caption: "UNLI RICE?" },
            { image: "pic20.jpg", caption: "IDK just me and her" },
            { image: "pic21.jpg", caption: "with the cutie PATOOTIE" },
            { image: "pic22.jpg", caption: "WE OWN THE STREET CUH!" },
            { image: "pic23.jpg", caption: "Soulmates?" },
            { image: "pic24.jpg", caption: "U HOT!" },
            { image: "pic25.jpg", caption: "DAMN HOTTIE PIC OF HER" }
        ];
        
        // ============================================
        // END OF CONFIGURATION - DON'T EDIT BELOW
        // ============================================

        // Generate gallery from configuration
        const galleryGrid = document.getElementById('galleryGrid');
        
        photos.forEach(photo => {
            const galleryItem = document.createElement('div');
            galleryItem.className = 'gallery-item';
            galleryItem.innerHTML = `
                <img src="${photo.image}" alt="Bani and Hami" onerror="this.src='https://via.placeholder.com/600x800/7dd3fc/ffffff?text=Image+Not+Found'">
                <div class="gallery-caption">${photo.caption}</div>
            `;
            galleryGrid.appendChild(galleryItem);
        });

        // Get all elements
        const songCards = Array.from(document.querySelectorAll('.song-card'));
        const audioElements = songCards.map(card => card.querySelector('.song-audio'));
        const playPauseBtn = document.getElementById('playPauseBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const stopBtn = document.getElementById('stopBtn');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const currentTimeSpan = document.getElementById('currentTime');
        const durationSpan = document.getElementById('duration');
        const volumeSlider = document.getElementById('volumeSlider');
        const volumeFill = document.getElementById('volumeFill');
        const muteBtn = document.getElementById('muteBtn');
        const nowPlayingTitle = document.getElementById('nowPlayingTitle');
        const nowPlayingArtist = document.getElementById('nowPlayingArtist');

        // Player state
        let currentAudio = null;
        let currentCard = null;
        let currentIndex = -1;
        let isPlaying = false;
        let volume = 0.7;
        let isMuted = false;

        // Initialize volume for all audio elements
        function setAllVolume(value) {
            audioElements.forEach(audio => {
                if (audio) audio.volume = value;
            });
        }
        setAllVolume(volume);

        // Format time
        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        // Update progress bar
        function updateProgress() {
            if (!currentAudio) return;
            const current = currentAudio.currentTime;
            const duration = currentAudio.duration;
            if (duration) {
                const percent = (current / duration) * 100;
                progressFill.style.width = percent + '%';
                currentTimeSpan.textContent = formatTime(current);
                durationSpan.textContent = formatTime(duration);
            }
        }

        // Play song
        function playSong(card, index) {
            if (currentAudio) {
                currentAudio.pause();
                if (currentCard) {
                    const oldPlayBtn = currentCard.querySelector('.play-button');
                    if (oldPlayBtn) oldPlayBtn.textContent = '▶️';
                    currentCard.classList.remove('playing');
                }
            }

            currentAudio = card.querySelector('.song-audio');
            currentCard = card;
            currentIndex = index;

            const title = card.querySelector('.song-title').textContent;
            const artist = card.querySelector('.song-artist').textContent;
            nowPlayingTitle.textContent = title;
            nowPlayingArtist.textContent = artist;

            const playBtn = card.querySelector('.play-button');
            playBtn.textContent = '⏸️';
            card.classList.add('playing');

            currentAudio.volume = volume;
            currentAudio.play()
                .then(() => {
                    isPlaying = true;
                    playPauseBtn.textContent = '⏸️';
                })
                .catch(error => {
                    console.log('Playback failed:', error);
                });

            currentAudio.addEventListener('timeupdate', updateProgress);
            currentAudio.addEventListener('loadedmetadata', () => {
                durationSpan.textContent = formatTime(currentAudio.duration);
            });
            currentAudio.addEventListener('ended', () => {
                nextBtn.click();
            });
        }

        // Pause current song
        function pauseSong() {
            if (currentAudio && isPlaying) {
                currentAudio.pause();
                isPlaying = false;
                playPauseBtn.textContent = '⏯️';
                if (currentCard) {
                    const playBtn = currentCard.querySelector('.play-button');
                    playBtn.textContent = '▶️';
                }
            }
        }

        // Resume current song
        function resumeSong() {
            if (currentAudio && !isPlaying) {
                currentAudio.play();
                isPlaying = true;
                playPauseBtn.textContent = '⏸️';
                if (currentCard) {
                    const playBtn = currentCard.querySelector('.play-button');
                    playBtn.textContent = '⏸️';
                }
            }
        }

        // Stop song
        function stopSong() {
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
                isPlaying = false;
                playPauseBtn.textContent = '⏯️';
                if (currentCard) {
                    const playBtn = currentCard.querySelector('.play-button');
                    playBtn.textContent = '▶️';
                    currentCard.classList.remove('playing');
                }
                progressFill.style.width = '0%';
                currentTimeSpan.textContent = '0:00';
            }
        }

        // Add click events to song cards
        songCards.forEach((card, index) => {
            card.addEventListener('click', (e) => {
                e.preventDefault();
                if (e.target.classList.contains('play-button')) {
                    if (currentAudio && currentCard === card && isPlaying) {
                        pauseSong();
                    } else if (currentAudio && currentCard === card && !isPlaying) {
                        resumeSong();
                    } else {
                        playSong(card, index);
                    }
                } else {
                    if (currentCard === card && isPlaying) {
                        pauseSong();
                    } else {
                        playSong(card, index);
                    }
                }
            });
        });

        // Play/Pause button
        playPauseBtn.addEventListener('click', () => {
            if (currentAudio) {
                if (isPlaying) {
                    pauseSong();
                } else {
                    resumeSong();
                }
            } else if (songCards.length > 0) {
                playSong(songCards[0], 0);
            }
        });

        // Next button
        nextBtn.addEventListener('click', () => {
            if (songCards.length === 0) return;
            let nextIndex = 0;
            if (currentIndex !== -1) {
                nextIndex = (currentIndex + 1) % songCards.length;
            }
            playSong(songCards[nextIndex], nextIndex);
        });

        // Previous button
        prevBtn.addEventListener('click', () => {
            if (songCards.length === 0) return;
            let prevIndex = songCards.length - 1;
            if (currentIndex !== -1) {
                prevIndex = (currentIndex - 1 + songCards.length) % songCards.length;
            }
            playSong(songCards[prevIndex], prevIndex);
        });

        // Stop button
        stopBtn.addEventListener('click', stopSong);

        // Progress bar click
        progressBar.addEventListener('click', (e) => {
            if (!currentAudio) return;
            const rect = progressBar.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            currentAudio.currentTime = percent * currentAudio.duration;
        });

        // Volume control
        volumeSlider.addEventListener('click', (e) => {
            const rect = volumeSlider.getBoundingClientRect();
            volume = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
            volumeFill.style.width = (volume * 100) + '%';
            setAllVolume(volume);
            if (isMuted && volume > 0) {
                isMuted = false;
                muteBtn.textContent = '🔊';
            }
        });

        // Mute button
        muteBtn.addEventListener('click', () => {
            isMuted = !isMuted;
            if (isMuted) {
                setAllVolume(0);
                muteBtn.textContent = '🔇';
            } else {
                setAllVolume(volume);
                muteBtn.textContent = '🔊';
            }
        });

        console.log('Player initialized with', songCards.length, 'songs');
        console.log('Gallery initialized with', photos.length, 'images');
    </script>
